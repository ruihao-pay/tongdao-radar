<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通道雷达 · 海外支付通道全景</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
  .gate-pass { background: #d1fae5; color: #065f46; }
  .gate-cond { background: #fef3c7; color: #92400e; }
  .gate-fail { background: #fee2e2; color: #991b1b; }
  .gate-pending { background: #dbeafe; color: #1e40af; }
  .card { transition: all 0.2s; min-height: 290px; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
  .priority-card { background: linear-gradient(135deg, #faf5ff 0%, #fdf2f8 100%); border: 2px solid #c084fc !important; position: relative; }
  .priority-card::before { content: '🏆 强推'; position: absolute; top: -12px; left: 14px; background: linear-gradient(to right, #8b5cf6, #ec4899); color: white; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 9999px; letter-spacing: 0.3px; box-shadow: 0 2px 8px rgba(139,92,246,0.4); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .diff-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.5em; }
  .compare-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #8b5cf6; }
  .compare-fab { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(to right, #8b5cf6, #ec4899); color: white; padding: 12px 24px; border-radius: 9999px; box-shadow: 0 8px 24px rgba(139,92,246,0.4); cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; z-index: 30; transition: transform 0.2s; }
  .compare-fab:hover { transform: scale(1.05); }
  .selected-card { box-shadow: 0 0 0 3px #c084fc !important; }
  /* KPI 卡 */
  .kpi { cursor: pointer; transition: all 0.2s; }
  .kpi:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
  .kpi-active { ring: 2px; box-shadow: 0 0 0 3px rgba(99,102,241,0.5); }
  /* 业务切换器 */
  .biz-pill { padding: 6px 14px; border-radius: 9999px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid #e5e7eb; background: white; }
  .biz-pill.active { background: linear-gradient(to right, #8b5cf6, #ec4899); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
  @media (max-width: 640px) { .hide-mobile { display: none; } }
  /* 折叠分组 */
  details.tier-group > summary { list-style: none; }
  details.tier-group > summary::-webkit-details-marker { display: none; }
  details.tier-group > summary .arrow { display: inline-block; transition: transform 0.15s; }
  details.tier-group[open] > summary .arrow { transform: rotate(90deg); }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white shadow-lg sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-4">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <div>
        <h1 class="text-2xl font-bold flex items-center gap-2">🛰️ 通道雷达</h1>
        <p class="text-xs opacity-90 mt-1" id="meta-info">加载中...</p>
      </div>
      <div class="flex gap-2 text-sm">
        <a id="feishu-link" href="#" target="_blank" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-md transition">📋 飞书 Bitable</a>
      </div>
    </div>
  </div>
</header>

<!-- Tabs -->
<div class="bg-white border-b sticky top-[72px] z-30 shadow-sm">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex gap-1 overflow-x-auto">
      <button data-tab="overview" class="tab-btn active px-4 py-3 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600 whitespace-nowrap">📊 总览</button>
      <button data-tab="business" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-indigo-600 whitespace-nowrap">🎯 业务专题</button>
      <button data-tab="matrix" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-indigo-600 whitespace-nowrap">🗂️ 角色 × Gate</button>
      <button data-tab="stats" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-indigo-600 whitespace-nowrap">📈 统计</button>
    </div>
  </div>
</div>

<!-- Dashboard (KPI + mini-charts) -->
<div id="dashboard" class="bg-gradient-to-b from-indigo-50/50 to-transparent border-b">
  <div class="max-w-7xl mx-auto px-4 py-5">
    <div class="grid grid-cols-3 md:grid-cols-6 gap-3 mb-4" id="kpi-cards"></div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="mini-charts"></div>
  </div>
</div>

<!-- Filters -->
<div id="filters" class="bg-white border-b shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 grid grid-cols-2 md:grid-cols-7 gap-2">
    <input type="text" id="search" placeholder="🔍 搜索通道名/HQ/市场/差异化..." class="col-span-2 md:col-span-2 px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
    <select id="filter-region" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有地区</option>
    </select>
    <select id="filter-role" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有角色</option>
    </select>
    <select id="filter-gate" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有 Gate</option>
    </select>
    <select id="filter-rec" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有建议</option>
    </select>
    <select id="filter-ai" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有 AI</option>
      <option value="✅可接">✅ 可接 AI</option>
      <option value="❌不接">❌ 不接</option>
      <option value="⏳待问">⏳ 待问</option>
      <option value="未知">未知</option>
    </select>
  </div>
  <div class="max-w-7xl mx-auto px-4 pb-3 flex items-center justify-between gap-2 flex-wrap">
    <div class="flex items-center gap-3 text-sm">
      <span id="count-info" class="text-gray-600 font-medium">共 0 条</span>
      <button id="reset-filter" class="text-indigo-600 hover:underline text-xs">重置筛选</button>
      <button id="share-link" class="text-purple-600 hover:underline text-xs">📎 复制带筛选的链接</button>
    </div>
    <div class="flex gap-1">
      <button id="export-csv" class="px-3 py-1 text-xs rounded-md bg-emerald-600 text-white hover:bg-emerald-700">📥 导出 CSV</button>
      <button id="view-cards" class="view-btn px-3 py-1 text-xs rounded-md bg-indigo-600 text-white">卡片</button>
      <button id="view-table" class="view-btn px-3 py-1 text-xs rounded-md bg-gray-200 text-gray-700">表格</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 py-6">
  <div id="content"></div>
</main>

<!-- Detail Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <div id="modal-content"></div>
  </div>
</div>

<!-- Compare Modal -->
<div id="compare-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeCompare()">
  <div class="bg-white rounded-lg shadow-xl max-w-6xl w-full max-h-[90vh] overflow-y-auto">
    <div id="compare-content"></div>
  </div>
</div>

<!-- Footer -->
<footer class="text-center text-xs text-gray-500 py-6">
  锐浩 · Arcane Brilliance Limited · 持续更新中
</footer>

<script src="data.js"></script>
<script>
const data = window.CHANNELS_DATA || [];
const META = window.META || {};
const BUSINESSES = window.BUSINESSES || [];
const BIZ_LABELS = window.BIZ_LABELS || {biz1:"业务一", biz2:"业务二"};
let currentTab = 'overview';
let currentView = 'cards';
let currentBiz = (BUSINESSES[0] && BUSINESSES[0].id) || 'xianxian';
let filtered = [...data];
let selected = [];

// 维度配置
const DIMS = [
  {key:'sub',   label:'订阅',   short:'订'},
  {key:'rate',  label:'费率',   short:'费'},
  {key:'market',label:'市场',   short:'市'},
  {key:'cb',    label:'拒付',   short:'拒'},
  {key:'multi', label:'多商户', short:'多'},
  {key:'settle',label:'账期',   short:'期'}
];

// ============ 初始化 ============
function init() {
  document.getElementById('meta-info').textContent = `最后更新: ${META.lastUpdated} · 共 ${META.totalCount} 条通道`;
  document.getElementById('feishu-link').href = META.feishuUrl;
  buildFilters();
  bindEvents();
  readURLParams();
  renderDashboard();
  applyFilters();
}

function buildFilters() {
  fillSelect('filter-region', uniqueSorted(data.map(d=>d.region)));
  fillSelect('filter-role',   uniqueSorted(data.map(d=>d.role)));
  fillSelect('filter-gate',   uniqueSorted(data.map(d=>d.gate)));
  fillSelect('filter-rec',    uniqueSorted(data.map(d=>d.rec)));
}

function uniqueSorted(arr) { return [...new Set(arr.filter(Boolean))].sort(); }

function fillSelect(id, items) {
  const el = document.getElementById(id);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    el.appendChild(o);
  });
}

function bindEvents() {
  ['search','filter-region','filter-role','filter-gate','filter-rec','filter-ai'].forEach(id => {
    document.getElementById(id).addEventListener('input', onFilterChange);
    document.getElementById(id).addEventListener('change', onFilterChange);
  });
  document.getElementById('reset-filter').addEventListener('click', () => {
    document.getElementById('search').value = '';
    ['filter-region','filter-role','filter-gate','filter-rec','filter-ai'].forEach(id => document.getElementById(id).value = '');
    onFilterChange();
  });
  document.getElementById('share-link').addEventListener('click', shareLink);
  document.getElementById('export-csv').addEventListener('click', exportCSV);
  document.getElementById('view-cards').addEventListener('click', () => setView('cards'));
  document.getElementById('view-table').addEventListener('click', () => setView('table'));
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => setTab(btn.dataset.tab));
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCompare(); }
  });
}

function onFilterChange() {
  applyFilters();
  updateURL();
}

// ============ URL 状态 ============
function readURLParams() {
  const p = new URLSearchParams(location.search);
  if (p.get('tab')) {
    currentTab = p.get('tab');
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.dataset.tab === currentTab) { b.classList.add('border-indigo-600','text-indigo-600'); b.classList.remove('border-transparent','text-gray-600'); }
      else { b.classList.remove('border-indigo-600','text-indigo-600'); b.classList.add('border-transparent','text-gray-600'); }
    });
  }
  if (p.get('view')) currentView = p.get('view');
  if (p.get('biz')) currentBiz = p.get('biz');
  ['search','filter-region','filter-role','filter-gate','filter-rec','filter-ai'].forEach(id => {
    const v = p.get(id);
    if (v) document.getElementById(id).value = v;
  });
}

function updateURL() {
  const params = new URLSearchParams();
  if (currentTab !== 'overview') params.set('tab', currentTab);
  if (currentView !== 'cards') params.set('view', currentView);
  if (currentTab === 'business' && currentBiz !== (BUSINESSES[0]&&BUSINESSES[0].id)) params.set('biz', currentBiz);
  ['search','filter-region','filter-role','filter-gate','filter-rec','filter-ai'].forEach(id => {
    const v = document.getElementById(id).value;
    if (v) params.set(id, v);
  });
  const s = params.toString();
  history.replaceState(null, '', s ? '?' + s : location.pathname);
}

function shareLink() {
  updateURL();
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('share-link');
    const orig = btn.textContent;
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ============ Tab / View ============
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.dataset.tab === tab) { b.classList.add('border-indigo-600','text-indigo-600'); b.classList.remove('border-transparent','text-gray-600'); }
    else { b.classList.remove('border-indigo-600','text-indigo-600'); b.classList.add('border-transparent','text-gray-600'); }
  });
  applyFilters();
  updateURL();
}

function setView(v) {
  currentView = v;
  document.getElementById('view-cards').className = `view-btn px-3 py-1 text-xs rounded-md ${v==='cards'?'bg-indigo-600 text-white':'bg-gray-200 text-gray-700'}`;
  document.getElementById('view-table').className = `view-btn px-3 py-1 text-xs rounded-md ${v==='table'?'bg-indigo-600 text-white':'bg-gray-200 text-gray-700'}`;
  render();
  updateURL();
}

// ============ Dashboard (KPI + mini-charts) ============
function renderDashboard() {
  const total = data.length;
  const aiOk = data.filter(d => d.ai === '✅可接').length;
  const strong = data.filter(d => (d.rec||'').includes('🏆')).length;
  const locked = data.filter(d => (d.rec||'').includes('🟢')).length;
  const hkOk = data.filter(d => d.hk === '✅').length;
  const noGo = data.filter(d => (d.rec||'').includes('❌')).length;

  const cards = [
    {label:'通道总数',  value:total,  color:'text-indigo-700 bg-white',         filter:null},
    {label:'接 AI 陪聊', value:aiOk,   color:'text-green-700 bg-green-50',       filter:{id:'filter-ai',value:'✅可接'}},
    {label:'🏆 强推',    value:strong, color:'text-purple-700 bg-purple-50',     filter:{id:'filter-rec',value:'🏆 强推'}},
    {label:'🟢 已锁',    value:locked, color:'text-emerald-700 bg-emerald-50',   filter:{id:'filter-rec',value:'🟢 已锁接入'}},
    {label:'HK ✅ 直签', value:hkOk,   color:'text-blue-700 bg-blue-50',         filter:null,onclick:'hkFilter'},
    {label:'❌ 不接入',  value:noGo,   color:'text-red-700 bg-red-50',           filter:{id:'filter-rec',value:'❌ 不接入'}}
  ];

  document.getElementById('kpi-cards').innerHTML = cards.map((k, i) => `
    <div class="kpi ${k.color} rounded-lg p-3 border shadow-sm" data-kpi="${i}" onclick="onKpiClick(${i})">
      <div class="text-[11px] text-gray-500 mb-1">${k.label}</div>
      <div class="text-2xl font-bold font-mono">${k.value}</div>
    </div>
  `).join('');

  // 缓存 KPI 配置供点击使用
  window._KPI = cards;

  // 迷你图:Gate 分布 + 建议分布
  const gateMap = {}, recMap = {};
  data.forEach(d => {
    gateMap[d.gate] = (gateMap[d.gate]||0) + 1;
    recMap[d.rec]  = (recMap[d.rec]||0) + 1;
  });

  document.getElementById('mini-charts').innerHTML = `
    <div class="bg-white rounded-lg border shadow-sm p-4">
      <div class="text-xs font-semibold text-gray-700 mb-2">Gate 状态分布</div>
      ${miniBars(gateMap, total, gateBarColor, 'filter-gate')}
    </div>
    <div class="bg-white rounded-lg border shadow-sm p-4">
      <div class="text-xs font-semibold text-gray-700 mb-2">建议分布</div>
      ${miniBars(recMap, total, recBarColor, 'filter-rec')}
    </div>
  `;
}

function miniBars(map, total, colorFn, filterId) {
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
    <div class="mb-1.5 cursor-pointer hover:bg-gray-50 rounded px-1 -mx-1" onclick="setFilter('${filterId}', '${k.replace(/'/g, "\\'")}')">
      <div class="flex justify-between text-[11px] mb-0.5">
        <span class="text-gray-700">${k}</span>
        <span class="font-mono text-gray-500">${v}</span>
      </div>
      <div class="h-1.5 bg-gray-100 rounded">
        <div class="h-1.5 ${colorFn(k)} rounded" style="width:${v/total*100}%"></div>
      </div>
    </div>
  `).join('');
}

function gateBarColor(k) { return k.startsWith('✅')?'bg-emerald-500':k.startsWith('⚠️')?'bg-yellow-500':k.startsWith('❌')?'bg-red-500':'bg-blue-500'; }
function recBarColor(k)  { return k.includes('🏆')?'bg-purple-500':k.includes('🟢')?'bg-green-500':k.includes('P2')?'bg-blue-500':k.includes('观察')?'bg-indigo-400':k.includes('备选')?'bg-gray-400':k.includes('❌')?'bg-red-400':'bg-yellow-400'; }

function onKpiClick(i) {
  const k = window._KPI[i];
  if (k.onclick === 'hkFilter') {
    // HK ✅ 不在 filter 下拉里,用搜索
    document.getElementById('search').value = '';
    // 选不到 HK,改成在所有 filter 里搜 hk='✅' — 简化为提示用户
    alert('HK ✅ 直签筛选请用建议或地区组合');
    return;
  }
  if (k.filter) {
    setFilter(k.filter.id, k.filter.value);
  } else {
    // 总数:重置全部
    document.getElementById('search').value = '';
    ['filter-region','filter-role','filter-gate','filter-rec','filter-ai'].forEach(id => document.getElementById(id).value = '');
    onFilterChange();
  }
}

function setFilter(id, value) {
  document.getElementById(id).value = value;
  if (currentTab !== 'overview') setTab('overview');
  onFilterChange();
  window.scrollTo({top: document.getElementById('filters').offsetTop - 100, behavior:'smooth'});
}

// ============ Filter ============
function applyFilters() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fr = document.getElementById('filter-region').value;
  const fo = document.getElementById('filter-role').value;
  const fg = document.getElementById('filter-gate').value;
  const fc = document.getElementById('filter-rec').value;
  const fa = document.getElementById('filter-ai').value;

  filtered = data.filter(d => {
    if (q && !(`${d.name} ${d.hq||''} ${d.max_market||''} ${d.coverage||''} ${d.diff||''} ${d.region||''} ${d.role||''}`).toLowerCase().includes(q)) return false;
    if (fr && d.region !== fr) return false;
    if (fo && d.role !== fo) return false;
    if (fg && d.gate !== fg) return false;
    if (fc && d.rec !== fc) return false;
    if (fa && d.ai !== fa) return false;
    return true;
  });

  document.getElementById('count-info').textContent = `共 ${filtered.length} 条`;
  render();
}

// ============ Render ============
function render() {
  const root = document.getElementById('content');
  if (currentTab === 'matrix') return renderMatrix(root);
  if (currentTab === 'stats') return renderStats(root);
  if (currentTab === 'business') return renderBusiness(root);
  if (currentView === 'table') return renderTable(root);
  return renderCards(root);
}

function gateClass(gate) {
  if (gate.startsWith('✅')) return 'gate-pass';
  if (gate.startsWith('⚠️')) return 'gate-cond';
  if (gate.startsWith('❌')) return 'gate-fail';
  if (gate.startsWith('⏳')) return 'gate-pending';
  return 'bg-gray-100 text-gray-700';
}

function aiClass(ai) {
  if (ai === '✅可接') return 'bg-green-100 text-green-800 font-semibold';
  if (ai === '❌不接') return 'bg-red-100 text-red-700';
  if (ai === '⏳待问') return 'bg-yellow-100 text-yellow-800';
  return 'bg-gray-100 text-gray-600';
}

function recClass(rec) {
  if (rec.includes('🏆')) return 'bg-purple-200 text-purple-900 font-bold';
  if (rec.includes('🟢')) return 'bg-green-100 text-green-800 font-semibold';
  if (rec.includes('P2')) return 'bg-blue-100 text-blue-800';
  if (rec.includes('观察')) return 'bg-indigo-50 text-indigo-700';
  if (rec.includes('备选')) return 'bg-gray-100 text-gray-700';
  if (rec.includes('❌')) return 'bg-red-50 text-red-600';
  if (rec.includes('搁置')) return 'bg-yellow-50 text-yellow-700';
  return 'bg-gray-100 text-gray-700';
}

function scoreColor(v) {
  if (v >= 8) return 'bg-emerald-500';
  if (v >= 6) return 'bg-green-500';
  if (v >= 4) return 'bg-yellow-400';
  if (v >= 2) return 'bg-orange-400';
  return 'bg-red-400';
}

function scoreBars(d) {
  return `<div class="grid grid-cols-6 gap-1 text-[10px] mt-2">${DIMS.map(({key,short,label}) => {
    const v = d[key] || 0;
    return `<div class="text-center" title="${label}: ${v}">
      <div class="text-gray-400 mb-0.5">${short}</div>
      <div class="h-1.5 bg-gray-100 rounded">
        <div class="h-1.5 ${scoreColor(v)} rounded transition-all" style="width: ${v*10}%"></div>
      </div>
      <div class="text-gray-600 mt-0.5 font-mono text-[10px]">${v}</div>
    </div>`;
  }).join('')}</div>`;
}

function isSelected(idx) { return selected.indexOf(idx) >= 0; }

function toggleSelect(idx, e) {
  e.stopPropagation();
  const i = selected.indexOf(idx);
  if (i >= 0) selected.splice(i, 1);
  else if (selected.length < 4) selected.push(idx);
  else { alert('最多对比 4 个通道'); return; }
  updateCompareFAB();
  render();
}

function updateCompareFAB() {
  let btn = document.getElementById('compare-fab');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'compare-fab';
    btn.className = 'compare-fab';
    btn.onclick = openCompare;
    document.body.appendChild(btn);
  }
  if (selected.length >= 2) {
    btn.innerHTML = `<span>📊 对比 ${selected.length} 条</span>`;
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }
}

function clearCompare() {
  selected = [];

}

function sortByRec(list) {
  return [...list].sort((a,b) => {
    const score = (r) => r.includes('🏆')?100 : r.includes('🟢')?80 : r.includes('P2')?50 : r.includes('观察')?40 : r.includes('备选')?30 : r.includes('搁置')?20 : 10;
    const ra = score(a.rec||''), rb = score(b.rec||'');
    if (ra !== rb) return rb - ra;
    return (b.biz1||0) + (b.biz2||0) - (a.biz1||0) - (a.biz2||0);
  });
}

function renderCards(root) {
  if (filtered.length === 0) return root.innerHTML = '<p class="text-center text-gray-400 py-12">没有匹配的通道</p>';

  // 分层:主力 / Antom 子方式 / 已淘汰(Gate FAIL),让主力通道不被稀释
  const main = [], sub = [], retired = [];
  filtered.forEach(d => {
    if ((d.gate||'').includes('❌')) retired.push(d);
    else if (d.role === 'Antom子方式') sub.push(d);
    else main.push(d);
  });

  const grid = (list) => `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">` +
    sortByRec(list).map(d => cardHTML(d, data.indexOf(d))).join('') + `</div>`;

  const group = (list, title, note, open) => !list.length ? '' : `
    <details class="tier-group mt-6" ${open?'open':''}>
      <summary class="cursor-pointer select-none flex items-center gap-2 px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-semibold text-gray-700">
        <span class="arrow text-gray-400">▶</span>
        ${title} <span class="badge bg-gray-200 text-gray-600">${list.length}</span>
        <span class="font-normal text-gray-500 text-xs hide-mobile">${note}</span>
      </summary>
      <div class="mt-4">${grid(list)}</div>
    </details>`;

  let html = main.length ? grid(main) : '<p class="text-center text-gray-400 py-8">无主力通道(已全部折叠在下方)</p>';
  html += group(sub, 'Antom 子方式', '— 多为"留 Antom",一般无需单独决策', main.length === 0);
  html += group(retired, '已淘汰 / Gate FAIL', '— 不可签约,仅留档', main.length === 0 && sub.length === 0);
  root.innerHTML = html;
}

function renderBusiness(root) {
  if (BUSINESSES.length === 0) {
    root.innerHTML = `<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center text-yellow-800">
      <p class="font-medium">暂未配置业务</p>
      <p class="text-xs mt-2">在 data.js 的 BUSINESSES 数组里添加业务配置</p>
    </div>`;
    return;
  }
  const biz = BUSINESSES.find(b => b.id === currentBiz) || BUSINESSES[0];

  // 按业务的 check 函数计算各通道在 4 道 Gate 上的得分
  const candidates = filtered.map(d => {
    const r = biz.check(d);
    const pass = Object.values(r).filter(v => v===true).length;
    return {d, r, pass};
  });
  const t1 = candidates.filter(c => c.pass === 4).map(c => c.d);          // 全适配
  const t2 = candidates.filter(c => c.pass === 3).map(c => c.d);          // 3/4
  const t3 = candidates.filter(c => c.pass === 2).map(c => c.d);          // 2/4
  const others = candidates.filter(c => c.pass <= 1).length;

  // 业务切换器
  const switcher = `
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <span class="text-xs text-gray-500">业务切换:</span>
      ${BUSINESSES.map(b => `
        <button class="biz-pill ${b.id===biz.id?'active':''}" onclick="setBiz('${b.id}')">${b.short || b.name}</button>
      `).join('')}
      <span class="text-xs text-gray-400 ml-2">类目: ${biz.category||'—'}</span>
    </div>
  `;

  // 各 Gate 通过数(配色)
  const gatePassCount = (gateIdx) => candidates.filter(c => Object.values(c.r)[gateIdx]===true).length;

  root.innerHTML = `
    <div class="space-y-6">
      ${switcher}

      <div class="bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-lg p-5">
        <h2 class="font-bold text-lg text-purple-900 mb-1">🎯 ${biz.name} 适配筛选</h2>
        <p class="text-xs text-purple-700">${biz.category||'—'}</p>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm mt-4">
          ${biz.gates.map((g, i) => `
            <div class="bg-white/60 rounded p-3 text-center">
              <div class="text-xs text-purple-700 mb-1">Gate ${'①②③④'[i]}</div>
              <div class="font-semibold text-purple-900 text-sm">${g}</div>
              <div class="text-xs text-purple-500 mt-1">${gatePassCount(i)} 条通过</div>
            </div>
          `).join('')}
        </div>
        <p class="text-xs text-purple-700 mt-3">候选分布: T1 全适配 <b>${t1.length}</b> · T2 三道过 <b>${t2.length}</b> · T3 两道过 <b>${t3.length}</b> · 其他 ${others}</p>
      </div>

      <div>
        <h3 class="font-bold text-green-700 mb-3 flex items-center gap-2">🏆 T1 — 4/4 全适配（${t1.length}）<span class="text-xs font-normal text-gray-500">立即可接触</span></h3>
        ${t1.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${t1.map(d => cardHTML(d, data.indexOf(d))).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}
      </div>

      <div>
        <h3 class="font-bold text-yellow-700 mb-3 flex items-center gap-2">⚠️ T2 — 3/4 部分适配（${t2.length}）<span class="text-xs font-normal text-gray-500">具体确认 1 道</span></h3>
        ${t2.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${t2.map(d => cardHTML(d, data.indexOf(d))).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}

      </div>
    </div>
  `;
}

// ============ 角色 × Gate 矩阵 ============
function renderMatrix(root) {
  const roles = uniqueSorted(filtered.map(d=>d.role));
  const gates = ['✅ PASS', '⚠️ 条件PASS', '⚠️ 部分FAIL', '❌ FAIL', '⏳ 待评'];

  const matrix = {};
  roles.forEach(r => {
    matrix[r] = {};
    gates.forEach(g => { matrix[r][g] = filtered.filter(d => d.role === r && d.gate === g); });
  });

  root.innerHTML = `
    <div class="bg-white rounded-lg shadow-sm border overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-3 py-2 text-left text-xs uppercase text-gray-600">角色 \\ Gate</th>
            ${gates.map(g => `<th class="px-3 py-2 text-center text-xs"><span class="badge ${gateClass(g)}">${g}</span></th>`).join('')}
            <th class="px-3 py-2 text-right text-xs uppercase text-gray-600">合计</th>
          </tr>
        </thead>
        <tbody>
          ${roles.map(r => {
            const rowTotal = gates.reduce((sum, g) => sum + matrix[r][g].length, 0);
            return `
              <tr class="border-t">
                <td class="px-3 py-2 font-medium text-gray-700">${r}</td>
                ${gates.map(g => {
                  const cell = matrix[r][g];
                  if (cell.length === 0) return `<td class="px-3 py-2 text-center text-gray-300">—</td>`;
                  return `<td class="px-3 py-2 text-center align-top">
                    <div class="font-mono text-base font-semibold">${cell.length}</div>
                    <div class="text-xs text-gray-500 mt-1 leading-tight">${cell.map(c=>c.name).join(', ')}</div>
                  </td>`;
                }).join('')}
                <td class="px-3 py-2 text-right font-mono font-semibold">${rowTotal}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

        <h3 class="font-bold text-gray-900 mb-3">按角色</h3>
        ${renderBar(byRole, roleColor)}

      <div class="bg-white rounded-lg shadow-sm border p-5 md:col-span-2">
        <h3 class="font-bold text-gray-900 mb-3">按地区</h3>
        ${renderBar(byRegion, regionColor)}

                <td class="border px-3 py-2 text-xs font-medium text-gray-700 sticky left-0 ${rowDiffs[i]?'bg-yellow-50':'bg-white'}">${label}${rowDiffs[i]?' <span class="text-yellow-600">●</span>':''}</td>

          </tbody>
        </table>
      </div>
      <p class="text-xs text-gray-500 mt-3"><span class="text-yellow-600">●</span> = 该行有差异</p>
    </div>
  `;
  document.getElementById('compare-modal').classList.remove('hidden');
}

function closeCompare() { document.getElementById('compare-modal').classList.add('hidden'); }

// ============ CSV 导出 ============
function exportCSV() {
  const cols = ['通道名','地区','角色','Gate','建议','驱动级','HK直签','接AI','HQ','最大市场','覆盖地区','订阅','费率','市场','拒付','多商户','账期','战略窗口','接入成本',BIZ_LABELS.biz1,BIZ_LABELS.biz2,'核心差异化'];
  const keys = ['name','region','role','gate','rec','driver','hk','ai','hq','max_market','coverage','sub','rate','market','cb','multi','settle','window','cost','biz1','biz2','diff'];
  const esc = v => `"${(v??'').toString().replace(/"/g,'""').replace(/\n/g,' ')}"`;
  const csv = [cols.join(',')].concat(filtered.map(d => keys.map(k => esc(d[k])).join(','))).join('\n');
  const blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `通道雷达_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

init();
