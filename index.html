<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通道雷达 · 海外支付通道全景</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
  .gate-pass { background: #d1fae5; color: #065f46; }
  .gate-cond { background: #fef3c7; color: #92400e; }
  .gate-fail { background: #fee2e2; color: #991b1b; }
  .gate-pending { background: #dbeafe; color: #1e40af; }
  .card { transition: all 0.2s; min-height: 290px; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
  .priority-card { background: #f0fdf4; border: 2px solid #34d399 !important; position: relative; }
  .priority-card::before { content: '强推'; position: absolute; top: -12px; left: 14px; background: #047857; color: white; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 9999px; letter-spacing: 0.3px; box-shadow: 0 2px 8px rgba(4,120,87,0.25); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .diff-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.5em; }
  .compare-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #8b5cf6; }
  .compare-fab { position: fixed; bottom: 24px; right: 24px; background: #111827; color: white; padding: 12px 24px; border-radius: 9999px; box-shadow: 0 8px 24px rgba(17,24,39,0.25); cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; z-index: 30; transition: transform 0.2s; }
  .compare-fab:hover { transform: scale(1.05); }
  .selected-card { box-shadow: 0 0 0 3px #c084fc !important; }
  /* KPI 卡 */
  .kpi { cursor: pointer; transition: all 0.2s; }
  .kpi:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
  .kpi-active { ring: 2px; box-shadow: 0 0 0 3px rgba(99,102,241,0.5); }
  /* 业务切换器 */
  .biz-pill { padding: 6px 14px; border-radius: 9999px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid #e5e7eb; background: white; }
  .biz-pill.active { background: #111827; color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(17,24,39,0.18); }
  .decision-card { border-left: 4px solid #0f766e; }
  .decision-rank { width: 34px; height: 34px; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; background: #ccfbf1; color: #0f766e; flex: 0 0 auto; }
  .action-pill { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; background: #f3f4f6; color: #374151; }
  @media (max-width: 640px) { .hide-mobile { display: none; } }
  /* 折叠分组 */
  details.tier-group > summary { list-style: none; }
  details.tier-group > summary::-webkit-details-marker { display: none; }
  details.tier-group > summary .arrow { display: inline-block; transition: transform 0.15s; }
  details.tier-group[open] > summary .arrow { transform: rotate(90deg); }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white text-gray-900 shadow-sm border-b sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-4">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <div>
        <h1 class="text-2xl font-bold flex items-center gap-2">通道雷达</h1>
        <p class="text-xs text-gray-500 mt-1" id="meta-info">加载中...</p>
      </div>
      <div class="flex gap-2 text-sm">
        <a id="feishu-link" href="#" target="_blank" class="bg-gray-900 text-white hover:bg-gray-700 px-3 py-1.5 rounded-md transition">飞书 Bitable</a>
      </div>
    </div>
  </div>
</header>

<!-- Tabs -->
<div class="bg-white border-b sticky top-[72px] z-30 shadow-sm">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex gap-1 overflow-x-auto">
      <button data-tab="decision" class="tab-btn active px-4 py-3 text-sm font-medium border-b-2 border-gray-900 text-gray-900 whitespace-nowrap">决策台</button>
      <button data-tab="connected" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">已对接渠道</button>
      <button data-tab="business" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">业务专题</button>
      <button data-tab="overview" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">全部通道</button>
      <button data-tab="matrix" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">角色 × Gate</button>
      <button data-tab="stats" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">统计</button>
    </div>
  </div>
</div>

<!-- Dashboard (KPI + mini-charts) -->
<div id="dashboard" class="bg-gradient-to-b from-indigo-50/50 to-transparent border-b">
  <div class="max-w-7xl mx-auto px-4 py-5">
    <div class="grid grid-cols-3 md:grid-cols-6 gap-3 mb-4" id="kpi-cards"></div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="mini-charts"></div>
  </div>
</div>

<!-- Filters -->
<div id="filters" class="bg-white border-b shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 grid grid-cols-2 md:grid-cols-10 gap-2">
    <input type="text" id="search" placeholder="🔍 搜索通道名/HQ/市场/差异化..." class="col-span-2 md:col-span-2 px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
    <select id="filter-region" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有地区</option>
    </select>
    <select id="filter-role" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有角色</option>
    </select>
    <select id="filter-gate" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有 Gate</option>
    </select>
    <select id="filter-rec" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有建议</option>
    </select>
    <select id="filter-ai" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有 AI</option>
      <option value="✅可接">✅ 可接特殊类目</option>
      <option value="❌不接">❌ 不接</option>
      <option value="⏳待问">⏳ 待问</option>
      <option value="未知">未知</option>
    </select>
    <select id="filter-hk" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有签约</option>
      <option value="✅">HK ✅</option>
      <option value="⚠️">HK ⚠️</option>
      <option value="❌">HK ❌</option>
    </select>
    <select id="filter-risk" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有风险</option>
      <option value="🔴 可接高风险">🔴 可接高风险/擦边</option>
      <option value="🟢 仅正规">🟢 仅正规</option>
      <option value="⚪ 待定">⚪ 待定</option>
    </select>
    <select id="sort-by" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="priority">默认优先级</option>
      <option value="biz2">业务二分数</option>
      <option value="biz1">业务一分数</option>
      <option value="rate">费率评分</option>
      <option value="settle">账期评分</option>
      <option value="cb">拒付评分</option>
      <option value="sub">订阅评分</option>
    </select>
  </div>
  <div class="max-w-7xl mx-auto px-4 pb-3 flex items-center justify-between gap-2 flex-wrap">
    <div class="flex items-center gap-3 text-sm">
      <span id="count-info" class="text-gray-600 font-medium">共 0 条</span>
      <button id="reset-filter" class="text-indigo-600 hover:underline text-xs">重置筛选</button>
      <button id="share-link" class="text-purple-600 hover:underline text-xs">📎 复制带筛选的链接</button>
    </div>
    <div class="flex gap-1">
      <button id="export-csv" class="px-3 py-1 text-xs rounded-md bg-emerald-600 text-white hover:bg-emerald-700">📥 导出 CSV</button>
      <button id="view-cards" class="view-btn px-3 py-1 text-xs rounded-md bg-indigo-600 text-white">卡片</button>
      <button id="view-table" class="view-btn px-3 py-1 text-xs rounded-md bg-gray-200 text-gray-700">表格</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 py-6">
  <div id="content"></div>
</main>

<!-- Detail Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <div id="modal-content"></div>
  </div>
</div>

<!-- Compare Modal -->
<div id="compare-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeCompare()">
  <div class="bg-white rounded-lg shadow-xl max-w-6xl w-full max-h-[90vh] overflow-y-auto">
    <div id="compare-content"></div>
  </div>
</div>

<!-- Footer -->
<footer class="text-center text-xs text-gray-500 py-6">
  Channel Radar · 持续更新中
</footer>

<!-- cache busting:每次加载都带时间戳,避免 GitHub Pages 浏览器缓存导致看不到最新 data.js -->
<script>document.write('<script src="data.js?t=' + Date.now() + '"><\/script>');</script>
<script>
const data = window.CHANNELS_DATA || [];
const META = window.META || {};
const BUSINESSES = window.BUSINESSES || [];
const CONNECTED_CHANNELS = window.CONNECTED_CHANNELS || [];
const BIZ_LABELS = window.BIZ_LABELS || {biz1:"业务一", biz2:"业务二"};
const FILTER_IDS = ['search','filter-region','filter-role','filter-gate','filter-rec','filter-ai','filter-hk','filter-risk','sort-by'];
const RESET_IDS = ['filter-region','filter-role','filter-gate','filter-rec','filter-ai','filter-hk','filter-risk','sort-by'];
let currentTab = 'decision';
let currentView = 'cards';
let currentBiz = (BUSINESSES[0] && BUSINESSES[0].id) || 'xianxian';
let connectedSubTab = 'main';
let filtered = [...data];
let selected = [];

// 维度配置
const DIMS = [
  {key:'sub',   label:'订阅',   short:'订'},
  {key:'rate',  label:'费率',   short:'费'},
  {key:'market',label:'市场',   short:'市'},
  {key:'cb',    label:'拒付',   short:'拒'},
  {key:'multi', label:'多商户', short:'多'},
  {key:'settle',label:'账期',   short:'期'}
];

// ============ 初始化 ============
function init() {
  document.getElementById('meta-info').textContent = `最后更新: ${META.lastUpdated} · 共 ${META.totalCount} 条通道`;
  document.getElementById('feishu-link').href = META.feishuUrl;
  buildFilters();
  bindEvents();
  readURLParams();
  renderDashboard();
  applyFilters();
}

function buildFilters() {
  fillSelect('filter-region', uniqueSorted(data.map(d=>d.region)));
  fillSelect('filter-role',   uniqueSorted(data.map(d=>d.role)));
  fillSelect('filter-gate',   uniqueSorted(data.map(d=>d.gate)));
  fillSelect('filter-rec',    uniqueSorted(data.map(d=>d.rec)));
}

function uniqueSorted(arr) { return [...new Set(arr.filter(Boolean))].sort(); }

function fillSelect(id, items) {
  const el = document.getElementById(id);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    el.appendChild(o);
  });
}

function bindEvents() {
  FILTER_IDS.forEach(id => {
    document.getElementById(id).addEventListener('input', onFilterChange);
    document.getElementById(id).addEventListener('change', onFilterChange);
  });
  document.getElementById('reset-filter').addEventListener('click', () => {
    document.getElementById('search').value = '';
    RESET_IDS.forEach(id => document.getElementById(id).value = '');
    onFilterChange();
  });
  document.getElementById('share-link').addEventListener('click', shareLink);
  document.getElementById('export-csv').addEventListener('click', exportCSV);
  document.getElementById('view-cards').addEventListener('click', () => setView('cards'));
  document.getElementById('view-table').addEventListener('click', () => setView('table'));
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => setTab(btn.dataset.tab));
  });
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-connected-subtab]');
    if (!btn) return;
    connectedSubTab = btn.dataset.connectedSubtab;
    render();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCompare(); }
  });
}

function onFilterChange() {
  applyFilters();
  updateURL();
}

// ============ URL 状态 ============
function readURLParams() {
  const p = new URLSearchParams(location.search);
  if (p.get('tab')) {
    currentTab = p.get('tab');
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.dataset.tab === currentTab) { b.classList.add('border-gray-900','text-gray-900'); b.classList.remove('border-transparent','text-gray-600'); }
      else { b.classList.remove('border-gray-900','text-gray-900'); b.classList.add('border-transparent','text-gray-600'); }
    });
  }
  if (p.get('view')) currentView = p.get('view');
  if (p.get('biz')) currentBiz = p.get('biz');
  FILTER_IDS.forEach(id => {
    const v = p.get(id);
    if (v) document.getElementById(id).value = v;
  });
}

function updateURL() {
  const params = new URLSearchParams();
  if (currentTab !== 'decision') params.set('tab', currentTab);
  if (currentView !== 'cards') params.set('view', currentView);
  if (currentTab === 'business' && currentBiz !== (BUSINESSES[0]&&BUSINESSES[0].id)) params.set('biz', currentBiz);
  FILTER_IDS.forEach(id => {
    const v = document.getElementById(id).value;
    if (v) params.set(id, v);
  });
  const s = params.toString();
  history.replaceState(null, '', s ? '?' + s : location.pathname);
}

function shareLink() {
  updateURL();
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('share-link');
    const orig = btn.textContent;
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ============ Tab / View ============
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.dataset.tab === tab) { b.classList.add('border-gray-900','text-gray-900'); b.classList.remove('border-transparent','text-gray-600'); }
    else { b.classList.remove('border-gray-900','text-gray-900'); b.classList.add('border-transparent','text-gray-600'); }
  });
  applyFilters();
  updateURL();
}

function setView(v) {
  currentView = v;
  document.getElementById('view-cards').className = `view-btn px-3 py-1 text-xs rounded-md ${v==='cards'?'bg-indigo-600 text-white':'bg-gray-200 text-gray-700'}`;
  document.getElementById('view-table').className = `view-btn px-3 py-1 text-xs rounded-md ${v==='table'?'bg-indigo-600 text-white':'bg-gray-200 text-gray-700'}`;
  render();
  updateURL();
}

// ============ Dashboard (KPI + mini-charts) ============
function renderDashboard() {
  const total = data.length;
  const aiOk = data.filter(d => d.ai === '✅可接').length;
  const strong = data.filter(d => (d.rec||'').includes('🏆')).length;
  const locked = data.filter(d => (d.rec||'').includes('🟢')).length;
  const hkOk = data.filter(d => d.hk === '✅').length;
  const noGo = data.filter(d => (d.rec||'').includes('❌')).length;

  const cards = [
    {label:'通道总数',  value:total,  color:'text-indigo-700 bg-white',         filter:null},
    {label:'接特殊类目', value:aiOk,   color:'text-green-700 bg-green-50',       filter:{id:'filter-ai',value:'✅可接'}},
    {label:'🏆 强推',    value:strong, color:'text-purple-700 bg-purple-50',     filter:{id:'filter-rec',value:'🏆 强推'}},
    {label:'🟢 已锁',    value:locked, color:'text-emerald-700 bg-emerald-50',   filter:{id:'filter-rec',value:'🟢 已锁接入'}},
    {label:'HK ✅ 直签', value:hkOk,   color:'text-blue-700 bg-blue-50',         filter:{id:'filter-hk',value:'✅'}},
    {label:'❌ 不接入',  value:noGo,   color:'text-red-700 bg-red-50',           filter:{id:'filter-rec',value:'❌ 不接入'}}
  ];

  document.getElementById('kpi-cards').innerHTML = cards.map((k, i) => `
    <div class="kpi ${k.color} rounded-lg p-3 border shadow-sm" data-kpi="${i}" onclick="onKpiClick(${i})">
      <div class="text-[11px] text-gray-500 mb-1">${k.label}</div>
      <div class="text-2xl font-bold font-mono">${k.value}</div>
    </div>
  `).join('');

  // 缓存 KPI 配置供点击使用
  window._KPI = cards;

  // 迷你图:Gate 分布 + 建议分布
  const gateMap = {}, recMap = {};
  data.forEach(d => {
    gateMap[d.gate] = (gateMap[d.gate]||0) + 1;
    recMap[d.rec]  = (recMap[d.rec]||0) + 1;
  });

  document.getElementById('mini-charts').innerHTML = `
    <div class="bg-white rounded-lg border shadow-sm p-4">
      <div class="text-xs font-semibold text-gray-700 mb-2">Gate 状态分布</div>
      ${miniBars(gateMap, total, gateBarColor, 'filter-gate')}
    </div>
    <div class="bg-white rounded-lg border shadow-sm p-4">
      <div class="text-xs font-semibold text-gray-700 mb-2">建议分布</div>
      ${miniBars(recMap, total, recBarColor, 'filter-rec')}
    </div>
  `;
}

function miniBars(map, total, colorFn, filterId) {
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
    <div class="mb-1.5 cursor-pointer hover:bg-gray-50 rounded px-1 -mx-1" onclick="setFilter('${filterId}', '${k.replace(/'/g, "\\'")}')">
      <div class="flex justify-between text-[11px] mb-0.5">
        <span class="text-gray-700">${k}</span>
        <span class="font-mono text-gray-500">${v}</span>
      </div>
      <div class="h-1.5 bg-gray-100 rounded">
        <div class="h-1.5 ${colorFn(k)} rounded" style="width:${v/total*100}%"></div>
      </div>
    </div>
  `).join('');
}

function gateBarColor(k) { return k.startsWith('✅')?'bg-emerald-500':k.startsWith('⚠️')?'bg-yellow-500':k.startsWith('❌')?'bg-red-500':'bg-blue-500'; }
function recBarColor(k)  { return k.includes('🏆')?'bg-purple-500':k.includes('🟢')?'bg-green-500':k.includes('P2')?'bg-blue-500':k.includes('观察')?'bg-indigo-400':k.includes('备选')?'bg-gray-400':k.includes('❌')?'bg-red-400':'bg-yellow-400'; }

function onKpiClick(i) {
  const k = window._KPI[i];
  if (k.filter) {
    setFilter(k.filter.id, k.filter.value);
  } else {
    // 总数:重置全部
    document.getElementById('search').value = '';
    RESET_IDS.forEach(id => document.getElementById(id).value = '');
    onFilterChange();
  }
}

function setFilter(id, value) {
  document.getElementById(id).value = value;
  if (currentTab !== 'overview') setTab('overview');
  onFilterChange();
  window.scrollTo({top: document.getElementById('filters').offsetTop - 100, behavior:'smooth'});
}

// ============ Filter ============
function applyFilters() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fr = document.getElementById('filter-region').value;
  const fo = document.getElementById('filter-role').value;
  const fg = document.getElementById('filter-gate').value;
  const fc = document.getElementById('filter-rec').value;
  const fa = document.getElementById('filter-ai').value;
  const fhk = document.getElementById('filter-hk').value;
  const frisk = document.getElementById('filter-risk').value;
  const sort = document.getElementById('sort-by').value;

  filtered = data.filter(d => {
    if (q && !(`${d.name} ${d.hq||''} ${d.max_market||''} ${d.coverage||''} ${d.diff||''} ${d.region||''} ${d.role||''}`).toLowerCase().includes(q)) return false;
    if (fr && d.region !== fr) return false;
    if (fo && d.role !== fo) return false;
    if (fg && d.gate !== fg) return false;
    if (fc && d.rec !== fc) return false;
    if (fa && d.ai !== fa) return false;
    if (fhk && d.hk !== fhk) return false;
    if (frisk && riskLevel(d) !== frisk) return false;
    return true;
  });

  filtered = sortChannels(filtered, sort);
  document.getElementById('count-info').textContent = `共 ${filtered.length} 条`;
  render();
}

// ============ Render ============
function render() {
  const root = document.getElementById('content');
  if (currentTab === 'decision') return renderDecision(root);
  if (currentTab === 'connected') return renderConnected(root);
  if (currentTab === 'matrix') return renderMatrix(root);
  if (currentTab === 'stats') return renderStats(root);
  if (currentTab === 'business') return renderBusiness(root);
  if (currentView === 'table') return renderTable(root);
  return renderCards(root);
}

function gateClass(gate) {
  if (gate.startsWith('✅')) return 'gate-pass';
  if (gate.startsWith('⚠️')) return 'gate-cond';
  if (gate.startsWith('❌')) return 'gate-fail';
  if (gate.startsWith('⏳')) return 'gate-pending';
  return 'bg-gray-100 text-gray-700';
}

function aiClass(ai) {
  if (ai === '✅可接') return 'bg-green-100 text-green-800 font-semibold';
  if (ai === '❌不接') return 'bg-red-100 text-red-700';
  if (ai === '⏳待问') return 'bg-yellow-100 text-yellow-800';
  return 'bg-gray-100 text-gray-600';
}

function recClass(rec) {
  if (rec.includes('🏆')) return 'bg-purple-200 text-purple-900 font-bold';
  if (rec.includes('🟢')) return 'bg-green-100 text-green-800 font-semibold';
  if (rec.includes('P2')) return 'bg-blue-100 text-blue-800';
  if (rec.includes('观察')) return 'bg-indigo-50 text-indigo-700';
  if (rec.includes('备选')) return 'bg-gray-100 text-gray-700';
  if (rec.includes('❌')) return 'bg-red-50 text-red-600';
  if (rec.includes('搁置')) return 'bg-yellow-50 text-yellow-700';
  return 'bg-gray-100 text-gray-700';
}

// 风险等级:手动 d.risk 优先,否则从特殊类目接受度列自动派生
function riskLevel(d) {
  if (d.risk) return d.risk;
  if (d.ai === '✅可接') return '🔴 可接高风险';
  if (d.ai === '❌不接') return '🟢 仅正规';
  return '⚪ 待定';
}
function riskClass(r) {
  if (r.includes('🔴')) return 'bg-rose-100 text-rose-700 font-semibold';
  if (r.includes('🟢')) return 'bg-emerald-100 text-emerald-700';
  return 'bg-gray-100 text-gray-500';
}

function scoreColor(v) {
  if (v >= 8) return 'bg-emerald-500';
  if (v >= 6) return 'bg-green-500';
  if (v >= 4) return 'bg-yellow-400';
  if (v >= 2) return 'bg-orange-400';
  return 'bg-red-400';
}

function scoreBars(d) {

}

function sortByRec(list) {
  return [...list].sort((a,b) => {
    const score = (r) => r.includes('🏆')?100 : r.includes('🟢')?80 : r.includes('P2')?50 : r.includes('观察')?40 : r.includes('备选')?30 : r.includes('搁置')?20 : 10;
    const ra = score(a.rec||''), rb = score(b.rec||'');
    if (ra !== rb) return rb - ra;
    return (b.biz1||0) + (b.biz2||0) - (a.biz1||0) - (a.biz2||0);
  });
}

function priorityScore(d) {
  const rec = d.rec || '';
  const gate = d.gate || '';
  return (rec.includes('🏆') ? 100 : rec.includes('🟢') ? 85 : rec.includes('P2') ? 62 : rec.includes('观察') ? 48 : rec.includes('备选') ? 42 : rec.includes('❌') ? 0 : 35)
    + (gate.startsWith('✅') ? 18 : gate.startsWith('⚠️') ? 8 : gate.startsWith('⏳') ? 4 : -20)
    + (d.ai === '✅可接' ? 8 : d.ai === '⏳待问' ? 3 : 0)
    + (d.hk === '✅' ? 5 : d.hk === '⚠️' ? 2 : -3)
    + ((d.biz1 || 0) + (d.biz2 || 0)) / 3;
}

function sortChannels(list, sort) {
  const sorted = [...list];
  if (!sort || sort === 'priority') return sorted.sort((a,b) => priorityScore(b) - priorityScore(a));
  return sorted.sort((a,b) => {
    const diff = (b[sort] || 0) - (a[sort] || 0);
    if (diff !== 0) return diff;
    return priorityScore(b) - priorityScore(a);
  });
}

function businessMatchScore(biz, d) {
  if (typeof biz.matchScore === 'function') return biz.matchScore(d);
  const result = biz.check(d);
  return Object.values(result).filter(Boolean).length * 2 + (d.biz2 || 0);
}

function businessCandidates(biz, source = filtered) {
  return source.map(d => {
    const r = biz.check(d);
    const pass = Object.values(r).filter(v => v === true).length;
    return {d, r, pass, score: businessMatchScore(biz, d)};
  }).sort((a,b) => {
    if (b.pass !== a.pass) return b.pass - a.pass;
    return b.score - a.score;
  });
}

function actionLabel(d) {
  if ((d.rec || '').includes('🏆')) return '本周优先约';
  if ((d.rec || '').includes('🟢')) return '维持主线';
  if ((d.gate || '').startsWith('⏳') || d.ai === '⏳待问') return '补商务问题';
  if ((d.gate || '').startsWith('❌') || (d.rec || '').includes('❌')) return '仅留档';
  if ((d.rec || '').includes('P2') || (d.rec || '').includes('备选')) return '备份跟进';
  return '观察';
}

  // 分层:主力 / Antom 子方式 / 已淘汰(Gate FAIL),让主力通道不被稀释
  const main = [], sub = [], retired = [];
  filtered.forEach(d => {
    if ((d.gate||'').includes('❌')) retired.push(d);
    else if (d.role === 'Antom子方式') sub.push(d);
    else main.push(d);
  });

  const grid = (list) => `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">` +
    list.map(d => cardHTML(d, data.indexOf(d))).join('') + `</div>`;

  const group = (list, title, note, open) => !list.length ? '' : `
    <details class="tier-group mt-6" ${open?'open':''}>
      <summary class="cursor-pointer select-none flex items-center gap-2 px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-semibold text-gray-700">
        <span class="arrow text-gray-400">▶</span>

        <span class="font-normal text-gray-500 text-xs hide-mobile">${note}</span>
      </summary>
      <div class="mt-4">${grid(list)}</div>
    </details>`;

  let html = main.length ? grid(main) : '<p class="text-center text-gray-400 py-8">无主力通道(已全部折叠在下方)</p>';
  html += group(sub, 'Antom 子方式', '— 多为"留 Antom",一般无需单独决策', main.length === 0);
  html += group(retired, '已淘汰 / Gate FAIL', '— 不可签约,仅留档', main.length === 0 && sub.length === 0);
  root.innerHTML = html;
}

// ============ 业务专题 ============
function setBiz(id) {
  currentBiz = id;
  render();
  updateURL();
}

function renderBusiness(root) {
  if (BUSINESSES.length === 0) {
    root.innerHTML = `<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center text-yellow-800">
      <p class="font-medium">暂未配置业务</p>
      <p class="text-xs mt-2">在 data.js 的 BUSINESSES 数组里添加业务配置</p>
    </div>`;
    return;
  }
  const biz = BUSINESSES.find(b => b.id === currentBiz) || BUSINESSES[0];

  // 按业务的 check + matchScore 计算候选适配度
  const candidates = businessCandidates(biz, filtered);
  const t1 = candidates.filter(c => c.pass === 4).map(c => c.d);          // 全适配
  const t2 = candidates.filter(c => c.pass === 3).map(c => c.d);          // 3/4
  const t3 = candidates.filter(c => c.pass === 2).map(c => c.d);          // 2/4
  const others = candidates.filter(c => c.pass <= 1).length;

  // 业务切换器
  const switcher = `
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <span class="text-xs text-gray-500">业务切换:</span>
      ${BUSINESSES.map(b => `
        <button class="biz-pill ${b.id===biz.id?'active':''}" onclick="setBiz('${b.id}')">${b.short || b.name}</button>
      `).join('')}
      <span class="text-xs text-gray-400 ml-2">类目: ${biz.category||'—'}</span>
    </div>
  `;

  // 各 Gate 通过数(配色)
  const gatePassCount = (gateIdx) => candidates.filter(c => Object.values(c.r)[gateIdx]===true).length;

  root.innerHTML = `
    <div class="space-y-6">
      ${switcher}

      <div class="bg-teal-50 border border-teal-200 rounded-lg p-5">
        <h2 class="font-bold text-lg text-teal-950 mb-1">${biz.name} 适配筛选</h2>
        <p class="text-xs text-teal-700">${biz.category||'—'}</p>
        <p class="text-xs text-gray-600 mt-2">${biz.priority||''}</p>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm mt-4">
          ${biz.gates.map((g, i) => `
            <div class="bg-white/60 rounded p-3 text-center">
              <div class="text-xs text-teal-700 mb-1">Gate ${i+1}</div>
              <div class="font-semibold text-teal-950 text-sm">${g}</div>
              <div class="text-xs text-teal-600 mt-1">${gatePassCount(i)} 条通过</div>
            </div>
          `).join('')}
        </div>
        <p class="text-xs text-teal-700 mt-3">候选分布: T1 全适配 <b>${t1.length}</b> · T2 三道过 <b>${t2.length}</b> · T3 两道过 <b>${t3.length}</b> · 其他 ${others}</p>
        <p class="text-xs text-teal-800 bg-white/70 rounded p-2 mt-3">下一步: ${biz.nextStep||'补齐关键商务问题后再推进。'}</p>
      </div>

      <div>
        <h3 class="font-bold text-green-700 mb-3 flex items-center gap-2">🏆 T1 — 4/4 全适配（${t1.length}）<span class="text-xs font-normal text-gray-500">立即可接触</span></h3>
        ${t1.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${t1.map(d => cardHTML(d, data.indexOf(d))).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}
      </div>

      <div>
        <h3 class="font-bold text-yellow-700 mb-3 flex items-center gap-2">⚠️ T2 — 3/4 部分适配（${t2.length}）<span class="text-xs font-normal text-gray-500">具体确认 1 道</span></h3>
        ${t2.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${t2.map(d => cardHTML(d, data.indexOf(d))).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}
      </div>

      <div>
        <h3 class="font-bold text-blue-700 mb-3 flex items-center gap-2">⏳ T3 — 2/4 待评估（${t3.length}）<span class="text-xs font-normal text-gray-500">需补 2 道资料</span></h3>
        ${t3.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${t3.map(d => cardHTML(d, data.indexOf(d))).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}
      </div>
    </div>
  `;
}

// ============ 角色 × Gate 矩阵 ============
function renderMatrix(root) {
  const roles = uniqueSorted(filtered.map(d=>d.role));
  const gates = ['✅ PASS', '⚠️ 条件PASS', '⚠️ 部分FAIL', '❌ FAIL', '⏳ 待评'];

  const matrix = {};
  roles.forEach(r => {
    matrix[r] = {};
    gates.forEach(g => { matrix[r][g] = filtered.filter(d => d.role === r && d.gate === g); });
  });

  root.innerHTML = `
    <div class="bg-white rounded-lg shadow-sm border overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-3 py-2 text-left text-xs uppercase text-gray-600">角色 \\ Gate</th>
            ${gates.map(g => `<th class="px-3 py-2 text-center text-xs"><span class="badge ${gateClass(g)}">${g}</span></th>`).join('')}
            <th class="px-3 py-2 text-right text-xs uppercase text-gray-600">合计</th>
          </tr>
        </thead>
        <tbody>
          ${roles.map(r => {
            const rowTotal = gates.reduce((sum, g) => sum + matrix[r][g].length, 0);
            return `
              <tr class="border-t">
                <td class="px-3 py-2 font-medium text-gray-700">${r}</td>
                ${gates.map(g => {
                  const cell = matrix[r][g];
                  if (cell.length === 0) return `<td class="px-3 py-2 text-center text-gray-300">—</td>`;
                  return `<td class="px-3 py-2 text-center align-top">
                    <div class="font-mono text-base font-semibold">${cell.length}</div>
                    <div class="text-xs text-gray-500 mt-1 leading-tight">${cell.map(c=>c.name).join(', ')}</div>
                  </td>`;
                }).join('')}
                <td class="px-3 py-2 text-right font-mono font-semibold">${rowTotal}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ============ 统计 ============
function renderStats(root) {
  const total = filtered.length;
  const by = (k) => { const m={}; filtered.forEach(d => m[d[k]] = (m[d[k]]||0)+1); return m; };
  const byGate = by('gate'), byRec = by('rec'), byAI = by('ai'), byRegion = by('region'), byRole = by('role');

  const renderBar = (obj, colorFn) => Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
    <div class="mb-2">
      <div class="flex justify-between text-xs mb-1">
        <span class="text-gray-700">${k}</span>
        <span class="font-mono text-gray-500">${v} (${(v/total*100).toFixed(0)}%)</span>
      </div>
      <div class="h-2 bg-gray-100 rounded">
        <div class="h-2 ${colorFn(k)} rounded transition-all" style="width:${v/total*100}%"></div>
      </div>
    </div>
  `).join('');

  const aiColor = k => k==='✅可接'?'bg-emerald-500':k==='❌不接'?'bg-red-500':k==='⏳待问'?'bg-yellow-500':'bg-gray-400';
  const regionColor = () => 'bg-indigo-400';
  const roleColor = () => 'bg-violet-400';

  root.innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按 Gate 状态（${total} 条）</h3>
        ${renderBar(byGate, gateBarColor)}
      </div>
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按建议</h3>
        ${renderBar(byRec, recBarColor)}
      </div>
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按特殊类目接受度</h3>
        ${renderBar(byAI, aiColor)}
      </div>
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按角色</h3>
        ${renderBar(byRole, roleColor)}
      </div>
      <div class="bg-white rounded-lg shadow-sm border p-5 md:col-span-2">
        <h3 class="font-bold text-gray-900 mb-3">按地区</h3>
        ${renderBar(byRegion, regionColor)}
      </div>
    </div>
  `;
}

// ============ 详情 Modal ============
function showDetail(idx) {
  const d = data[idx];
  if (!d) return;
  const scoreRow = (k, v) => `<div><div class="text-xs text-gray-500">${k}</div><div class="font-mono text-lg font-semibold">${v||'—'}</div></div>`;
  const fits = BUSINESSES.map(biz => {
    const r = biz.check(d);
    const pass = Object.values(r).filter(Boolean).length;
    return {biz, pass, score: businessMatchScore(biz, d)};
  }).sort((a,b) => b.pass - a.pass || b.score - a.score);

  document.getElementById('modal-content').innerHTML = `
    <div class="bg-gray-900 text-white p-5 rounded-t-lg">
      <div class="flex items-start justify-between">
        <div>
          <h2 class="text-2xl font-bold">${d.name}</h2>
          <p class="text-sm opacity-90 mt-1">${d.region} · ${d.role} · ${d.hq||'—'}</p>
        </div>
        <button onclick="closeModal()" class="text-white/80 hover:text-white text-2xl leading-none">×</button>
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        <span class="badge ${gateClass(d.gate)}">${d.gate}</span>
        <span class="badge ${recClass(d.rec)}">${d.rec}</span>
        <span class="badge ${aiClass(d.ai)}">AI: ${d.ai}</span>
        <span class="badge ${riskClass(riskLevel(d))}">${riskLevel(d)}</span>
        <span class="badge bg-white/20 text-white">HK ${d.hk}</span>
        <span class="badge bg-white/20 text-white">${d.driver}</span>
        <span class="badge bg-emerald-500 text-white">${actionLabel(d)}</span>
      </div>
    </div>
    <div class="p-5 space-y-4">
      <div class="bg-teal-50 border border-teal-100 rounded-lg p-3">
        <h3 class="text-sm font-bold text-teal-950 mb-2">业务适配</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
          ${fits.map(f => `
            <div class="bg-white rounded border p-2">
              <div class="flex items-center justify-between gap-2">
                <span class="text-sm font-semibold text-gray-900">${f.biz.short || f.biz.name}</span>
                <span class="font-mono text-xs text-teal-700">${f.pass}/${f.biz.gates.length}</span>
              </div>
              <div class="text-xs text-gray-500 mt-1">匹配 ${(f.score||0).toFixed(1)} · ${f.pass >= 3 ? '可重点看' : f.pass === 2 ? '待补资料' : '弱相关'}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">核心差异化</h3>
        <p class="text-sm text-gray-700 leading-relaxed">${d.diff||'—'}</p>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">市场覆盖</h3>
        <div class="text-sm text-gray-700"><strong>最大市场：</strong>${d.max_market||'—'}<br><strong>覆盖地区：</strong>${d.coverage||'—'}</div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">综合评分</h3>
        <div class="grid grid-cols-2 gap-3">
          ${scoreRow(BIZ_LABELS.biz1, (d.biz1||0).toFixed(2))}
          ${scoreRow(BIZ_LABELS.biz2, (d.biz2||0).toFixed(2))}
        </div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">维度评分</h3>
        <div class="grid grid-cols-3 gap-3 text-sm">
          ${DIMS.map(({key,label}) => scoreRow(label, d[key])).join('')}
        </div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">接入信息</h3>
        <div class="text-sm text-gray-700 space-y-1">
          <div><strong>接入成本：</strong>${d.cost||'—'}</div>
          <div><strong>战略窗口：</strong>${d.window}</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

// ============ 对比 Modal ============
function openCompare() {
  if (selected.length < 2) return;
  const items = selected.map(i => data[i]);
  const rows = [
    ['通道名', items.map(d => `<strong>${d.name}</strong>`)],
    ['地区', items.map(d => d.region)],
    ['角色', items.map(d => d.role)],
    ['HQ', items.map(d => d.hq||'—')],
    ['最大市场', items.map(d => d.max_market||'—')],
    ['覆盖地区', items.map(d => d.coverage||'—')],
    ['Gate', items.map(d => `<span class="badge ${gateClass(d.gate)}">${d.gate}</span>`)],
    ['建议', items.map(d => `<span class="badge ${recClass(d.rec)}">${d.rec}</span>`)],
    ['驱动级', items.map(d => d.driver)],
    ['特殊类目', items.map(d => `<span class="badge ${aiClass(d.ai)}">${d.ai}</span>`)],
    ['风险等级', items.map(d => `<span class="badge ${riskClass(riskLevel(d))}">${riskLevel(d)}</span>`)],
    ['HK 直签', items.map(d => d.hk)],
    ['接入成本', items.map(d => d.cost||'—')],
    ['战略窗口', items.map(d => d.window)],
    ...DIMS.map(({key,label}) => [label, items.map(d => `<div class="flex items-center gap-2"><span class="font-mono font-semibold">${d[key]||0}</span><div class="flex-1 h-1.5 bg-gray-100 rounded"><div class="h-1.5 ${scoreColor(d[key]||0)} rounded" style="width:${(d[key]||0)*10}%"></div></div></div>`)]),
    [BIZ_LABELS.biz1, items.map(d => `<span class="font-mono font-bold text-lg">${(d.biz1||0).toFixed(2)}</span>`)],
    [BIZ_LABELS.biz2, items.map(d => `<span class="font-mono font-bold text-lg">${(d.biz2||0).toFixed(2)}</span>`)],
    ['核心差异化', items.map(d => `<div class="text-xs leading-relaxed">${d.diff||'—'}</div>`)]
  ];

  const rowDiffs = rows.map(([_, vals]) => {
    const stripped = vals.map(v => typeof v === 'string' ? v.replace(/<[^>]+>/g,'').trim() : v);
    const allSame = stripped.every(v => v === stripped[0]);
    return !allSame;
  });

  document.getElementById('compare-content').innerHTML = `
    <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-5 rounded-t-lg sticky top-0 z-10">
      <div class="flex items-start justify-between">
        <div>
          <h2 class="text-xl font-bold">📊 通道对比 (${items.length})</h2>
          <p class="text-xs opacity-90 mt-1">${items.map(d=>d.name).join(' · ')}</p>
        </div>
        <button onclick="closeCompare()" class="text-white/80 hover:text-white text-2xl leading-none">×</button>
      </div>
    </div>
    <div class="p-4">
      <div class="flex justify-end mb-3 gap-2">
        <button onclick="clearCompare();closeCompare();" class="text-xs text-red-600 hover:underline">清空选择</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm border-collapse">
          <thead class="bg-gray-50">
            <tr>
              <th class="border px-3 py-2 text-left text-xs uppercase text-gray-600 sticky left-0 bg-gray-50">维度</th>
              ${items.map(d => `<th class="border px-3 py-2 text-left">${d.name}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.map(([label, vals], i) => `
              <tr class="${rowDiffs[i]?'bg-yellow-50':'bg-white'} hover:bg-blue-50">
                <td class="border px-3 py-2 text-xs font-medium text-gray-700 sticky left-0 ${rowDiffs[i]?'bg-yellow-50':'bg-white'}">${label}${rowDiffs[i]?' <span class="text-yellow-600">●</span>':''}</td>
                ${vals.map(v => `<td class="border px-3 py-2 text-sm align-top">${v}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <p class="text-xs text-gray-500 mt-3"><span class="text-yellow-600">●</span> = 该行有差异</p>
    </div>
  `;
  document.getElementById('compare-modal').classList.remove('hidden');
}

function closeCompare() { document.getElementById('compare-modal').classList.add('hidden'); }

// ============ CSV 导出 ============
function exportCSV() {
  const cols = ['通道名','地区','角色','Gate','建议','驱动级','HK直签','接AI','HQ','最大市场','覆盖地区','订阅','费率','市场','拒付','多商户','账期','战略窗口','接入成本',BIZ_LABELS.biz1,BIZ_LABELS.biz2,'核心差异化'];
  const keys = ['name','region','role','gate','rec','driver','hk','ai','hq','max_market','coverage','sub','rate','market','cb','multi','settle','window','cost','biz1','biz2','diff'];
  const esc = v => `"${(v??'').toString().replace(/"/g,'""').replace(/\n/g,' ')}"`;
  const csv = [cols.join(',')].concat(filtered.map(d => keys.map(k => esc(d[k])).join(','))).join('\n');
  const blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `通道雷达_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
