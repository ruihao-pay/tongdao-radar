<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通道雷达 · 海外支付通道全景</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
  .gate-pass { background: #d1fae5; color: #065f46; }
  .gate-cond { background: #fef3c7; color: #92400e; }
  .gate-fail { background: #fee2e2; color: #991b1b; }
  .gate-pending { background: #dbeafe; color: #1e40af; }
  .card-hover { transition: all 0.2s; }
  .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
  .score-bar { height: 4px; border-radius: 2px; background: linear-gradient(to right, #10b981 var(--score), #e5e7eb var(--score)); }
  @media (max-width: 640px) { .hide-mobile { display: none; } }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-4">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <div>
        <h1 class="text-2xl font-bold">🛰️ 通道雷达</h1>
        <p class="text-xs opacity-90 mt-1" id="meta-info">加载中...</p>
      </div>
      <div class="flex gap-2 text-sm">
        <a id="feishu-link" href="#" target="_blank" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-md transition">📋 飞书 Bitable</a>
      </div>
    </div>
  </div>
</header>

<!-- Tabs -->
<div class="bg-white border-b sticky top-[72px] z-30 shadow-sm">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex gap-1 overflow-x-auto">
      <button data-tab="overview" class="tab-btn active px-4 py-3 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600 whitespace-nowrap">📊 总览</button>
      <button data-tab="xianxian" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-indigo-600 whitespace-nowrap">🎯 闲闲专题</button>
      <button data-tab="matrix" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-indigo-600 whitespace-nowrap">🗂️ 类型矩阵</button>
      <button data-tab="stats" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-indigo-600 whitespace-nowrap">📈 统计</button>
    </div>
  </div>
</div>

<!-- Filters -->
<div id="filters" class="bg-white border-b shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 grid grid-cols-2 md:grid-cols-6 gap-2">
    <input type="text" id="search" placeholder="🔍 搜索通道名/HQ/市场..." class="col-span-2 md:col-span-2 px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
    <select id="filter-type" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有类型</option>
    </select>
    <select id="filter-gate" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有 Gate</option>
    </select>
    <select id="filter-rec" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有建议</option>
    </select>
    <select id="filter-ai" class="px-3 py-2 border rounded-md text-sm bg-white">
      <option value="">所有 AI</option>
      <option value="✅可接">✅ 可接 AI</option>
      <option value="❌不接">❌ 不接</option>
      <option value="⏳待问">⏳ 待问</option>
      <option value="未知">未知</option>
    </select>
  </div>
  <div class="max-w-7xl mx-auto px-4 pb-3 flex items-center justify-between gap-2 flex-wrap">
    <div class="flex items-center gap-3 text-sm">
      <span id="count-info" class="text-gray-600 font-medium">共 0 条</span>
      <button id="reset-filter" class="text-indigo-600 hover:underline text-xs">重置筛选</button>
    </div>
    <div class="flex gap-1">
      <button id="view-cards" class="view-btn px-3 py-1 text-xs rounded-md bg-indigo-600 text-white">卡片</button>
      <button id="view-table" class="view-btn px-3 py-1 text-xs rounded-md bg-gray-200 text-gray-700">表格</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 py-6">
  <div id="content"></div>
</main>

<!-- Detail Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <div id="modal-content"></div>
  </div>
</div>

<!-- Footer -->
<footer class="text-center text-xs text-gray-500 py-6">
  锐浩 · Arcane Brilliance Limited · 持续更新中
</footer>

<script src="data.js"></script>
<script>
const data = window.CHANNELS_DATA || [];
const META = window.META || {};
let currentTab = 'overview';
let currentView = 'cards';
let filtered = [...data];

// 初始化
function init() {
  document.getElementById('meta-info').textContent = `最后更新: ${META.lastUpdated} · 共 ${META.totalCount} 条通道`;
  document.getElementById('feishu-link').href = META.feishuUrl;
  buildFilters();
  bindEvents();
  applyFilters();
}

function buildFilters() {
  const types = [...new Set(data.map(d=>d.type))].sort();
  const gates = [...new Set(data.map(d=>d.gate))].sort();
  const recs = [...new Set(data.map(d=>d.rec))].sort();
  fillSelect('filter-type', types);
  fillSelect('filter-gate', gates);
  fillSelect('filter-rec', recs);
}

function fillSelect(id, items) {
  const el = document.getElementById(id);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    el.appendChild(o);
  });
}

function bindEvents() {
  ['search','filter-type','filter-gate','filter-rec','filter-ai'].forEach(id => {
    document.getElementById(id).addEventListener('input', applyFilters);
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  document.getElementById('reset-filter').addEventListener('click', () => {
    document.getElementById('search').value = '';
    ['filter-type','filter-gate','filter-rec','filter-ai'].forEach(id => document.getElementById(id).value = '');
    applyFilters();
  });
  document.getElementById('view-cards').addEventListener('click', () => setView('cards'));
  document.getElementById('view-table').addEventListener('click', () => setView('table'));
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => setTab(btn.dataset.tab));
  });
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.dataset.tab === tab) {
      b.classList.add('border-indigo-600','text-indigo-600');
      b.classList.remove('border-transparent','text-gray-600');
    } else {
      b.classList.remove('border-indigo-600','text-indigo-600');
      b.classList.add('border-transparent','text-gray-600');
    }
  });
  applyFilters();
}

function setView(v) {
  currentView = v;
  document.getElementById('view-cards').className = `view-btn px-3 py-1 text-xs rounded-md ${v==='cards'?'bg-indigo-600 text-white':'bg-gray-200 text-gray-700'}`;
  document.getElementById('view-table').className = `view-btn px-3 py-1 text-xs rounded-md ${v==='table'?'bg-indigo-600 text-white':'bg-gray-200 text-gray-700'}`;
  render();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const ft = document.getElementById('filter-type').value;
  const fg = document.getElementById('filter-gate').value;
  const fr = document.getElementById('filter-rec').value;
  const fa = document.getElementById('filter-ai').value;

  filtered = data.filter(d => {
    if (q && !(`${d.name} ${d.hq||''} ${d.max_market||''} ${d.coverage||''}`).toLowerCase().includes(q)) return false;
    if (ft && d.type !== ft) return false;
    if (fg && d.gate !== fg) return false;
    if (fr && d.rec !== fr) return false;
    if (fa && d.ai !== fa) return false;
    return true;
  });

  // tab-specific filtering
  if (currentTab === 'xianxian') {
    filtered = filtered.filter(d => d.ai === '✅可接' || d.ai === '⏳待问');
  }

  document.getElementById('count-info').textContent = `共 ${filtered.length} 条`;
  render();
}

function render() {
  const root = document.getElementById('content');
  if (currentTab === 'matrix') return renderMatrix(root);
  if (currentTab === 'stats') return renderStats(root);
  if (currentTab === 'xianxian') return renderXianxian(root);
  if (currentView === 'table') return renderTable(root);
  return renderCards(root);
}

function gateClass(gate) {
  if (gate.startsWith('✅')) return 'gate-pass';
  if (gate.startsWith('⚠️')) return 'gate-cond';
  if (gate.startsWith('❌')) return 'gate-fail';
  if (gate.startsWith('⏳')) return 'gate-pending';
  return 'bg-gray-100 text-gray-700';
}

function aiClass(ai) {
  if (ai === '✅可接') return 'bg-green-100 text-green-800';
  if (ai === '❌不接') return 'bg-red-100 text-red-700';
  if (ai === '⏳待问') return 'bg-yellow-100 text-yellow-800';
  return 'bg-gray-100 text-gray-600';
}

function recClass(rec) {
  if (rec.includes('🏆')) return 'bg-purple-100 text-purple-800 font-semibold';
  if (rec.includes('🟢')) return 'bg-green-100 text-green-800 font-semibold';
  if (rec.includes('P2')) return 'bg-blue-100 text-blue-800';
  if (rec.includes('观察')) return 'bg-indigo-50 text-indigo-700';
  if (rec.includes('备选')) return 'bg-gray-100 text-gray-700';
  if (rec.includes('❌')) return 'bg-red-50 text-red-600';
  if (rec.includes('搁置')) return 'bg-yellow-50 text-yellow-700';
  return 'bg-gray-100 text-gray-700';
}

function renderCards(root) {
  if (filtered.length === 0) return root.innerHTML = '<p class="text-center text-gray-400 py-12">没有匹配的通道</p>';

  // 排序：推荐 > biz1 + biz2
  const sorted = [...filtered].sort((a,b) => {
    const ra = a.rec.includes('🏆')?100 : a.rec.includes('🟢')?80 : a.rec.includes('P2')?50 : a.rec.includes('观察')?40 : a.rec.includes('备选')?30 : a.rec.includes('搁置')?20 : 10;
    const rb = b.rec.includes('🏆')?100 : b.rec.includes('🟢')?80 : b.rec.includes('P2')?50 : b.rec.includes('观察')?40 : b.rec.includes('备选')?30 : b.rec.includes('搁置')?20 : 10;
    if (ra !== rb) return rb - ra;
    return (b.biz1||0) + (b.biz2||0) - (a.biz1||0) - (a.biz2||0);
  });

  root.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">` +
    sorted.map((d, i) => `
      <div class="card-hover bg-white rounded-lg shadow-sm border p-4 cursor-pointer" onclick='showDetail(${data.indexOf(d)})'>
        <div class="flex items-start justify-between mb-2">
          <h3 class="font-semibold text-gray-900 text-base">${d.name}</h3>
          <span class="badge ${aiClass(d.ai)}">${d.ai}</span>
        </div>
        <div class="text-xs text-gray-500 mb-2">${d.type} · ${d.hq||'—'}</div>
        <div class="flex flex-wrap gap-1 mb-3">
          <span class="badge ${gateClass(d.gate)}">${d.gate}</span>
          <span class="badge ${recClass(d.rec)}">${d.rec}</span>
          <span class="badge bg-gray-100 text-gray-700">HK ${d.hk}</span>
        </div>
        <div class="text-xs text-gray-600 line-clamp-2 mb-3">${d.diff||'—'}</div>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <div>
            <div class="text-gray-500">业务一</div>
            <div class="font-semibold text-gray-900">${(d.biz1||0).toFixed(2)}</div>
          </div>
          <div>
            <div class="text-gray-500">业务二</div>
            <div class="font-semibold text-gray-900">${(d.biz2||0).toFixed(2)}</div>
          </div>
        </div>
      </div>
    `).join('') + `</div>`;
}

function renderTable(root) {
  if (filtered.length === 0) return root.innerHTML = '<p class="text-center text-gray-400 py-12">没有匹配的通道</p>';

  const sorted = [...filtered].sort((a,b) => (b.biz1||0)-(a.biz1||0));

  root.innerHTML = `
    <div class="bg-white rounded-lg shadow-sm border overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-xs uppercase text-gray-600">
          <tr>
            <th class="px-3 py-2 text-left">通道名</th>
            <th class="px-3 py-2 text-left">类型</th>
            <th class="px-3 py-2 text-left">Gate</th>
            <th class="px-3 py-2 text-left">建议</th>
            <th class="px-3 py-2 text-left hide-mobile">AI</th>
            <th class="px-3 py-2 text-left hide-mobile">HK</th>
            <th class="px-3 py-2 text-right">业务一</th>
            <th class="px-3 py-2 text-right">业务二</th>
            <th class="px-3 py-2 text-left hide-mobile">差异化</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(d => `
            <tr class="border-t hover:bg-gray-50 cursor-pointer" onclick='showDetail(${data.indexOf(d)})'>
              <td class="px-3 py-2 font-medium text-gray-900">${d.name}</td>
              <td class="px-3 py-2 text-gray-600">${d.type}</td>
              <td class="px-3 py-2"><span class="badge ${gateClass(d.gate)}">${d.gate}</span></td>
              <td class="px-3 py-2"><span class="badge ${recClass(d.rec)}">${d.rec}</span></td>
              <td class="px-3 py-2 hide-mobile"><span class="badge ${aiClass(d.ai)}">${d.ai}</span></td>
              <td class="px-3 py-2 hide-mobile">${d.hk}</td>
              <td class="px-3 py-2 text-right font-mono text-xs">${(d.biz1||0).toFixed(2)}</td>
              <td class="px-3 py-2 text-right font-mono text-xs">${(d.biz2||0).toFixed(2)}</td>
              <td class="px-3 py-2 text-xs text-gray-600 hide-mobile max-w-xs truncate" title="${d.diff||''}">${d.diff||'—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderXianxian(root) {
  // 闲闲专题：分三档展示
  const t1 = filtered.filter(d => d.ai === '✅可接' && d.hk === '✅' && d.gate.startsWith('✅'));
  const t2 = filtered.filter(d => d.ai === '✅可接' && !(d.hk === '✅' && d.gate.startsWith('✅')));
  const t3 = filtered.filter(d => d.ai === '⏳待问');

  const card = (d) => `
    <div class="card-hover bg-white rounded-lg shadow-sm border p-4 cursor-pointer" onclick='showDetail(${data.indexOf(d)})'>
      <div class="flex items-start justify-between mb-2">
        <h3 class="font-semibold text-gray-900">${d.name}</h3>
        <span class="badge ${recClass(d.rec)}">${d.rec}</span>
      </div>
      <div class="text-xs text-gray-500 mb-2">${d.type} · ${d.hq||'—'}</div>
      <div class="text-xs text-gray-600 mb-2">${d.diff||'—'}</div>
      <div class="flex gap-1 flex-wrap">
        <span class="badge ${gateClass(d.gate)}">${d.gate}</span>
        <span class="badge bg-gray-100 text-gray-700">订阅 ${d.sub}</span>
        <span class="badge bg-gray-100 text-gray-700">费率 ${d.rate}</span>
      </div>
    </div>
  `;

  root.innerHTML = `
    <div class="space-y-6">
      <div class="bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-lg p-4">
        <h2 class="font-bold text-lg text-purple-900 mb-2">🎯 闲闲（AI 陪聊）适配筛选</h2>
        <p class="text-sm text-purple-700">4 项 gate：①接 AI 陪聊 ②HK 直签 ③Gate PASS ④订阅功能 ≥5</p>
        <p class="text-xs text-purple-600 mt-2">当前候选数：T1 ${t1.length} 条 · T2 ${t2.length} 条 · T3 ${t3.length} 条</p>
      </div>

      <div>
        <h3 class="font-bold text-green-700 mb-3 flex items-center gap-2">🏆 T1 — 全适配候选（${t1.length}）<span class="text-xs font-normal text-gray-500">立即可接触</span></h3>
        ${t1.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${t1.map(card).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}
      </div>

      <div>
        <h3 class="font-bold text-yellow-700 mb-3 flex items-center gap-2">⚠️ T2 — 部分适配（${t2.length}）<span class="text-xs font-normal text-gray-500">有限制，需具体确认</span></h3>
        ${t2.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${t2.map(card).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}
      </div>

      <div>
        <h3 class="font-bold text-blue-700 mb-3 flex items-center gap-2">⏳ T3 — 待评估（${t3.length}）<span class="text-xs font-normal text-gray-500">需问 AI 陪聊类目接受度</span></h3>
        ${t3.length ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">${t3.map(card).join('')}</div>` : '<p class="text-gray-400 text-sm">无</p>'}
      </div>

      <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm">
        <h4 class="font-bold text-amber-900 mb-2">💡 关键提示</h4>
        <ul class="space-y-1 text-amber-800 text-xs list-disc pl-5">
          <li>领航主体寿命 6-12 月，需在窗口内拿到至少 1 个备份通道 alive</li>
          <li>主流大牌（Stripe/Adyen/Worldpay 等 11 家）对 AI 陪聊全军覆没，别再耗时间</li>
          <li>CCBill/Segpay/Epoch 在 5-6 因"英文成本"搁置，现在无退路必须重启</li>
          <li>加密支付（NOWPayments）可作辅助通道储备 5-10% 流量</li>
        </ul>
      </div>
    </div>
  `;
}

function renderMatrix(root) {
  const types = [...new Set(filtered.map(d=>d.type))].sort();
  const gates = ['✅ PASS', '⚠️ 条件PASS', '⚠️ 部分FAIL', '❌ FAIL', '⏳ 待评'];

  const matrix = {};
  types.forEach(t => {
    matrix[t] = {};
    gates.forEach(g => {
      matrix[t][g] = filtered.filter(d => d.type === t && d.gate === g);
    });
  });

  root.innerHTML = `
    <div class="bg-white rounded-lg shadow-sm border overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-3 py-2 text-left text-xs uppercase text-gray-600">类型 \\ Gate</th>
            ${gates.map(g => `<th class="px-3 py-2 text-center text-xs"><span class="badge ${gateClass(g)}">${g}</span></th>`).join('')}
            <th class="px-3 py-2 text-right text-xs uppercase text-gray-600">合计</th>
          </tr>
        </thead>
        <tbody>
          ${types.map(t => {
            const rowTotal = gates.reduce((sum, g) => sum + matrix[t][g].length, 0);
            return `
              <tr class="border-t">
                <td class="px-3 py-2 font-medium text-gray-700">${t}</td>
                ${gates.map(g => {
                  const cell = matrix[t][g];
                  if (cell.length === 0) return `<td class="px-3 py-2 text-center text-gray-300">—</td>`;
                  return `<td class="px-3 py-2 text-center">
                    <div class="font-mono text-base font-semibold">${cell.length}</div>
                    <div class="text-xs text-gray-500 mt-1">${cell.slice(0,3).map(c=>c.name).join(', ')}${cell.length>3?'...':''}</div>
                  </td>`;
                }).join('')}
                <td class="px-3 py-2 text-right font-mono font-semibold">${rowTotal}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderStats(root) {
  const total = filtered.length;
  const byGate = {};
  const byRec = {};
  const byAI = {};
  const byType = {};
  filtered.forEach(d => {
    byGate[d.gate] = (byGate[d.gate]||0)+1;
    byRec[d.rec] = (byRec[d.rec]||0)+1;
    byAI[d.ai] = (byAI[d.ai]||0)+1;
    byType[d.type] = (byType[d.type]||0)+1;
  });

  const renderBar = (obj, color) => Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
    <div class="mb-2">
      <div class="flex justify-between text-xs mb-1">
        <span class="text-gray-700">${k}</span>
        <span class="font-mono text-gray-500">${v} (${(v/total*100).toFixed(0)}%)</span>
      </div>
      <div class="h-2 bg-gray-100 rounded">
        <div class="h-2 ${color} rounded" style="width:${v/total*100}%"></div>
      </div>
    </div>
  `).join('');

  root.innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按 Gate 状态（${total} 条）</h3>
        ${renderBar(byGate, 'bg-indigo-500')}
      </div>
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按建议</h3>
        ${renderBar(byRec, 'bg-purple-500')}
      </div>
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按 AI 陪聊接受度</h3>
        ${renderBar(byAI, 'bg-emerald-500')}
      </div>
      <div class="bg-white rounded-lg shadow-sm border p-5">
        <h3 class="font-bold text-gray-900 mb-3">按类型 Top 10</h3>
        ${Object.entries(byType).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v]) => `
          <div class="flex justify-between text-sm py-1 border-b last:border-b-0">
            <span class="text-gray-700">${k}</span>
            <span class="font-mono text-gray-500">${v}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function showDetail(idx) {
  const d = data[idx];
  if (!d) return;
  const scoreRow = (k, v) => `<div><div class="text-xs text-gray-500">${k}</div><div class="font-mono text-lg font-semibold">${v||'—'}</div></div>`;

  document.getElementById('modal-content').innerHTML = `
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-5 rounded-t-lg">
      <div class="flex items-start justify-between">
        <div>
          <h2 class="text-2xl font-bold">${d.name}</h2>
          <p class="text-sm opacity-90 mt-1">${d.type} · ${d.hq||'—'}</p>
        </div>
        <button onclick="closeModal()" class="text-white/80 hover:text-white text-2xl leading-none">×</button>
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        <span class="badge ${gateClass(d.gate)}">${d.gate}</span>
        <span class="badge ${recClass(d.rec)}">${d.rec}</span>
        <span class="badge ${aiClass(d.ai)}">AI: ${d.ai}</span>
        <span class="badge bg-white/20 text-white">HK ${d.hk}</span>
        <span class="badge bg-white/20 text-white">${d.driver}</span>
      </div>
    </div>
    <div class="p-5 space-y-4">
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">核心差异化</h3>
        <p class="text-sm text-gray-700 leading-relaxed">${d.diff||'—'}</p>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">市场覆盖</h3>
        <div class="text-sm text-gray-700"><strong>最大市场：</strong>${d.max_market||'—'}<br><strong>覆盖地区：</strong>${d.coverage||'—'}</div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">综合评分</h3>
        <div class="grid grid-cols-2 gap-3">
          ${scoreRow('业务一综合', (d.biz1||0).toFixed(2))}
          ${scoreRow('业务二综合', (d.biz2||0).toFixed(2))}
        </div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">维度评分</h3>
        <div class="grid grid-cols-3 gap-3 text-sm">
          ${scoreRow('订阅功能', d.sub)}
          ${scoreRow('费率竞争', d.rate)}
          ${scoreRow('市场覆盖', d.market)}
          ${scoreRow('拒付管控', d.cb)}
          ${scoreRow('多商户', d.multi)}
          ${scoreRow('账期', d.settle)}
        </div>
      </div>
      <div>
        <h3 class="text-sm font-bold text-gray-700 mb-2">接入信息</h3>
        <div class="text-sm text-gray-700 space-y-1">
          <div><strong>接入成本：</strong>${d.cost||'—'}</div>
          <div><strong>战略窗口：</strong>${d.window}</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>

</body>
</html>
